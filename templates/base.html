<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduSex AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/dashboard">EduSex AI</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/surveys-page">Inquéritos</a></li>
          <li class="nav-item"><a class="nav-link" href="/analytics-page">Estatísticas</a></li>
          <li class="nav-item"><a class="nav-link" href="/chatbot-page">Chatbot</a></li>
          <li class="nav-item"><a class="nav-link" href="/predictions">IA</a></li>
          <li class="nav-item"><a class="nav-link" href="/ai-dashboard">Dashboard IA</a></li>
          <li class="nav-item"><a class="nav-link" href="/executive-dashboard">Executivo</a></li>
          <li class="nav-item"><a class="nav-link" href="/heatmap">Heatmap</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin">Administração</a></li>
        </ul>
        <span class="navbar-text me-3" id="userBadge"></span>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">Sair</button>
      </div>
    </div>
  </nav>
  <main class="container-fluid py-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
