{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h1 class="page-title">Painel Executivo</h1>
    <p class="text-secondary mb-0">Visão para ONGs, escolas e governos.</p>
  </div>
  <button class="btn btn-primary" id="generateReport"><i class="bi bi-file-earmark-text"></i> Gerar relatório</button>
</div>
<section class="row g-3" id="executiveCards"></section>
<section class="row g-3 mt-1">
  <div class="col-lg-6"><div class="panel"><h2>Regiões prioritárias</h2><div id="priorityRegions"></div></div></div>
  <div class="col-lg-6"><div class="panel"><h2>Centro de Alertas</h2><div id="alertCenter"></div></div></div>
  <div class="col-lg-6"><div class="panel"><h2>Top problemas</h2><ol id="topProblems"></ol></div></div>
  <div class="col-lg-6"><div class="panel"><h2>Top recomendações</h2><div id="topRecommendations"></div></div></div>
  <div class="col-12"><div class="panel"><h2>Relatório automático</h2><pre class="result-box" id="reportText"></pre></div></div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/executive_dashboard.js') }}"></script>
{% endblock %}
