<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registo | EduSex AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <h1>Criar Conta</h1>
      <form id="registerForm" class="vstack gap-3">
        <input class="form-control" name="name" placeholder="Nome" required>
        <input class="form-control" name="email" type="email" placeholder="Email" required>
        <input class="form-control" name="password" type="password" placeholder="Palavra-passe" required>
        <select class="form-select" name="role">
          <option value="USER">Utilizador</option>
          <option value="RESEARCHER">Investigador</option>
          <option value="ADMIN">Administrador</option>
        </select>
        <button class="btn btn-primary w-100" type="submit">Registar</button>
        <a href="/" class="link-primary text-center">Já tenho conta</a>
        <div id="message" class="small"></div>
      </form>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
